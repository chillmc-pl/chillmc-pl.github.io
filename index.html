<audio id="prankMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121214; display: flex; justify-content: center; align-items: center; z-index: 9999;">
    <button onclick="startPrank()" style="padding: 20px 40px; font-size: 1.5rem; background: #e58e26; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; box-shadow: 0 0 20px rgba(229,142,38,0.5);">
        Załaduj regulamin
    </button>
</div>

<style>
.fake-window {
    position: fixed;
    width: 300px;
    background: #1a1a1e;
    border: 3px solid #e58e26;
    border-radius: 8px;
    color: white;
    padding: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    z-index: 10000;
    font-family: sans-serif;
}
.fake-window h3 { margin-top: 0; color: #f5cd79; }
.fake-window button {
    background: #e58e26;
    border: none;
    color: white;
    padding: 5px 10px;
    cursor: pointer;
    float: right;
    border-radius: 4px;
}
</style>

<script>
function startPrank() {
    // Ukryj ekran startowy
    document.getElementById('overlay').style.display = 'none';
    
    // Włącz muzykę
    var audio = document.getElementById('prankMusic');
    audio.play().catch(function(error) {
        console.log("Odtwarzanie zablokowane przez przeglądarkę, wymagana interakcja.");
    });

    // Generuj kilkanaście fałszywych okienek na ekranie w losowych miejscach
    for (let i = 1; i <= 15; i++) {
        setTimeout(() => {
            createWindow(i);
        }, i * 200); // Okienka wyskakują jedno po drugim co 200ms
    }
}

function createWindow(id) {
    const win = document.createElement('div');
    win.className = 'fake-window';
    win.id = 'win-' + id;
    
    // Losowa pozycja na ekranie
    const top = Math.random() * (window.innerHeight - 150);
    const left = Math.random() * (window.innerWidth - 300);
    
    win.style.top = top + 'px';
    win.style.left = left + 'px';
    
    win.innerHTML = `
        <h3>⚠️ SYSTEM ERROR ${id}</h3>
        <p>Wykryto przeglądanie regulaminu bez licencji fana Minecrafta!</p>
        <button onclick="document.getElementById('win-${id}').remove()">OK</button>
    `;
    
    document.body.appendChild(win);
}
</script>
